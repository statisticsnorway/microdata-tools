name: Publish to PyPI

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

    - name: Sync dependencies
      run: uv sync

    - name: Run tests
      run: uv run pytest

  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: 
      name: pypi
      url: https://pypi.org/p/microdata-tools
    permissions:
      id-token: write # Required for PyPI trusted publishing (OIDC) via pypa/gh-action-pypi-publish
    needs: test
    if: success()
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.14'

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: false

    - name: Sync dependencies
      run: uv sync

    - name: Build
      run: uv build

    - name: Publish
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0


  github-release:
    name: Release pushed tag
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the git tag and let release-drafter create/publish the release
      pull-requests: read # Required for release-drafter to read merged PRs when building release notes
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync

      - name: Get current version
        id: version
        run: echo "value=$(uv version --short)" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag_exists
        run: |
          git fetch --tags
          if git rev-parse "v${{ steps.version.outputs.value }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        id: check-version
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"
          echo "tag=v${{ steps.version.outputs.value }}" >> $GITHUB_OUTPUT

      - name: Build package
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          uv build

      - name: Publish the release notes
        if: steps.tag_exists.outputs.exists == 'false'
        uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
        with:
          publish: ${{ steps.check-version.outputs.tag != '' }}
          tag: ${{ steps.check-version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}